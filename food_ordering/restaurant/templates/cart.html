{% extends 'base.html' %}

{% block content %}

<h2>Your Cart</h2>

<table class="table">

<tr>
<th>Food</th>
<th>Qty</th>
<th>Total</th>
<th></th>
</tr>

{% for food in foods %}

<tr>

<td>{{food.name}}</td>
<td>{{food.qty}}</td>
<td>${{food.total}}</td>

<td>
<a href="/remove/{{food.id}}" class="btn btn-danger">
Remove
</a>
</td>

</tr>

{% endfor %}

</table>

<h3>Total: ${{total}}</h3>

<a href="/checkout/" class="btn btn-success">
Checkout
</a>

{% endblock %}
